global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']      # node-exporter on host

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-sample:9113']   # we'll add exporter later if needed

  # Bonus: scrape Docker daemon metrics (if enabled)
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['host.docker.internal:9323']