version: '3.9'

services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    # Critical: host PID + rootfs mount needed to monitor the real machine (not container)
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns)($$|/)'
    # Exposes on host port 9100

  prometheus:
    image: prom/prometheus:v3.0.0   # or latest stable
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'           # allows reload without restart
    ports:
      - "9090:9090"
    networks:
      - monitoring-net
    depends_on:
      - node-exporter

  nginx:
    image: nginx:alpine
    container_name: nginx-sample
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx-logs:/var/log/nginx   # optional: expose logs if you want later
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana:11.3.0   # or latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      # Optional: pre-provision Prometheus as data source
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123   # change this!
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - monitoring-net
    depends_on:
      - prometheus

networks:
  monitoring-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data: